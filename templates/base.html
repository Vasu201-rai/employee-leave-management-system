<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Leave Management System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Leave Management System</a>
            <div>
                <a class="btn btn-outline-light btn-sm" href="{% url 'employee_list' %}">Employees</a>
                <a class="btn btn-outline-light btn-sm" href="{% url 'leave_list' %}">Leaves</a>
                <form method="POST" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
