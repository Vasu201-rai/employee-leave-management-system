{% extends 'base.html' %}
{% block title %}Delete Leave{% endblock %}
{% block content %}
<h1>Are you sure you want to delete this leave application for {{ leave.employee.name }}?</h1>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'leave_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
