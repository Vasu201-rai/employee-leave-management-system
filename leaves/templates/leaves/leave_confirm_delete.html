<!DOCTYPE html>
<html>
<head>
    <title>Delete Leave</title>
</head>
<body>
    <h1>Are you sure you want to delete this leave application for {{ leave.employee.name }}?</h1>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'leave_list' %}">Cancel</a>
    </form>
</body>
</html>
