<!DOCTYPE html>
<html>
<head>
    <title>Leave List</title>
</head>
<body>
    <h1>Leave Applications</h1>
    <form method="GET">
    <select name="status">
        <option value="">All Status</option>
        <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
        <option value="Approved" {% if status_filter == 'Approved' %}selected{% endif %}>Approved</option>
        <option value="Rejected" {% if status_filter == 'Rejected' %}selected{% endif %}>Rejected</option>
    </select>

    <select name="leave_type">
        <option value="">All Types</option>
        <option value="Casual" {% if type_filter == 'Casual' %}selected{% endif %}>Casual</option>
        <option value="Sick" {% if type_filter == 'Sick' %}selected{% endif %}>Sick</option>
        <option value="Earned" {% if type_filter == 'Earned' %}selected{% endif %}>Earned</option>
    </select>

    <button type="submit">Filter</button>
    </form>
    <a href="{% url 'leave_add' %}">+ Apply Leave</a>
    <table border="1" cellpadding="8">
        <tr>
            <th>Employee</th>
            <th>Leave Type</th>
            <th>From Date</th>
            <th>To Date</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        {% for leave in leaves %}
        <tr>
            <td>{{ leave.employee.name }}</td>
            <td>{{ leave.leave_type }}</td>
            <td>{{ leave.from_date }}</td>
            <td>{{ leave.to_date }}</td>
            <td>{{ leave.reason }}</td>
            <td>{{ leave.status }}</td>
            <td>
                <a href="{% url 'leave_update' leave.pk %}">Edit</a> |
                <a href="{% url 'leave_delete' leave.pk %}">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
