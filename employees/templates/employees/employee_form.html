{% extends 'base.html' %}
{% block title %}Employee Form{% endblock %}
{% block content %}
<h1>{% if form.instance.pk %}Update{% else %}Add{% endif %} Employee</h1>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{% url 'employee_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
